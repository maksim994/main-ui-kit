<article class="card card--article card--interactive">
    <div class="card__media">
        <picture class="img img--4-3 img--cover img--radius-md">
            <!-- <source srcset="/upload/example.avif" type="image/avif">-->
            <!-- <source srcset="/upload/example.webp" type="image/webp">-->
            <img src="@images" alt="Использование арматуры в строительстве" title="Использование арматуры в строительстве" loading="lazy">
        </picture>
    </div>

    <div class="card__body">
        <div class="card__top">
            <a href="#cat" class="card__category">@section</a>

            <h3 class="card__title">
                <a href="#" class="card__title-link">@name</a>
            </h3>
            <div class="card__excerpt">
                @text
            </div>
        </div>

        <div class="card__meta">
            <span class="card__meta-item">@date</span>

            <span class="card__meta-item">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                  <path d="M12 8V12L15 15M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                1 мин.
                            </span>

            <span class="card__meta-item">
                <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="32.000000" height="32.000000" fill="none">

        </div>
