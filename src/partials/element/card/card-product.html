<article class="card card--product card--interactive">
    <div class="card__media">
        <div class="card__badges">
            <span class="badge badge--warning">Акция</span>
            <span class="badge badge--error">Хит</span>
        </div>

        <div class="img img--1-1 img--contain img--radius-md">
            <img src="@images" alt="Виброрейка FROST-VR300" loading="lazy">
        </div>
    </div>

    <div class="card__body">
        <div class="card__top">
            <div class="card__price">
                <span class="card__price-current">35 300 ₽</span>
                <span class="card__price-old">36 000 ₽</span>
                <span class="badge badge--warning badge--sm card__price-discount">-700 ₽</span>
            </div>

            <h3 class="card__title">
                <a href="#" class="card__title-link">@name</a>
            </h3>

            <div class="card__caption">
                <span class="card__status is-success">В наличии</span>
                <span class="card__sku">Арт. VR300</span>
            </div>
        </div>

        <div class="card__footer">
            <div class="card__actions">
                <button class="btn btn-primary btn-block" type="button">
                    <span>В корзину</span>
                </button>

                <div class="card__action-icons">
                    <a href="#" class="card__icon-btn" aria-label="Сравнить">
                        <svg class="icon" viewBox="0 0 24 24" fill="none">
                            <path d="M10 6H5M19 6h-5M12 6v12M7 18h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </a>

                    <a href="#" class="card__icon-btn" aria-label="Избранное">
                        <svg class="icon" viewBox="0 0 24 24" fill="none">
                            <path d="M12 20s-7-4.4-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.6-7 10-7 10Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>
</article>
