<header class="header header--classic header--sticky js-header">

        <div class="header__inner">
            <div class="header__logo">
                @include('../logo/logo-svg.html')
            </div>

            <div class="header__nav">
                <nav class="nav" aria-label="Основная навигация">
                    <ul class="nav__list">
                        <li class="nav__item">
                            <a href="#" class="nav__link">Главная</a>
                        </li>

                        <li class="nav__item nav__item--has-dropdown">
                            <a href="#" class="nav__link">
                                Продукты
                                <span class="nav__arrow" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <path d="M19 9L12 16L5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </span>
                            </a>

                            <ul class="nav__dropdown">
                                <li class="nav__dropdown-item">
                                    <a href="#" class="nav__dropdown-link">Электроника</a>
                                </li>

                                <li class="nav__dropdown-item nav__dropdown-item--has-dropdown">
                                    <a href="#" class="nav__dropdown-link">
                                        Одежда

                                            <svg viewBox="0 0 24 24" fill="none">
                                                <path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                        </span>
                                    </a>

                                    <ul class="nav__subdropdown">
                                        <li class="nav__subdropdown-item">
                                            <a href="#" class="nav__subdropdown-link">Мужская одежда</a>
                                        </li>
                                        <li class="nav__subdropdown-item">
                                            <a href="#" class="nav__subdropdown-link">Женская одежда</a>
                                        </li>
                                        <li class="nav__subdropdown-item">
                                            <a href="#" class="nav__subdropdown-link">Аксессуары</a>
                                        </li>
                                    </ul>
                                </li>

                                <li class="nav__dropdown-item">
                                    <a href="#" class="nav__dropdown-link">Обувь</a>
                                </li>
                            </ul>
                        </li>

                        <li class="nav__item nav__item--has-dropdown">
                            <a href="#" class="nav__link">
                                Услуги
                                <span class="nav__arrow" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <path d="M19 9L12 16L5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </span>
                            </a>

                            <ul class="nav__dropdown">
                                <li class="nav__dropdown-item">
                                    <a href="#" class="nav__dropdown-link">Автоматизация</a>
                                </li>
                                <li class="nav__dropdown-item">
                                    <a href="#" class="nav__dropdown-link">Интеграция</a>
                                </li>
                            </ul>
                        </li>

                        <li class="nav__item">
                            <a href="#" class="nav__link">Контакты</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <div class="header__contacts">
                <div class="header-phone">
                    <button class="header-phone__trigger" type="button" aria-expanded="false">
                        <span class="header-phone__link">+7 000 111-22-33</span>
                        <span class="header-phone__arrow" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M19 9L12 16L5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </button>

                    <div class="header-phone__dropdown">
                        <div class="header-phone__group">
                            <div>
                                <div class="header-phone__label">Отдел продаж</div>
                                <div class="header-phone__value">+7 000 111-22-33</div>
                            </div>
                            <div>
                                <div class="header-phone__label">E-mail</div>
                                <div class="header-phone__value">mail@example.ru</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="header__actions">
                <a href="#" class="btn btn-link">Заказать звонок</a>
            </div>
